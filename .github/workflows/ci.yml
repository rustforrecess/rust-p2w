name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      # python3 is preinstalled on the runner, so the differential tests
      # compare against real CPython rather than skipping.
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo fmt --check
